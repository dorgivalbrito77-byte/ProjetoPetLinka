<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetLinka | Forma de Pagamento</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins', sans-serif;
background:#f4f6ff;
color:#333;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
position:fixed;
width:100%;
top:0;
z-index:1000;
}

.logo{
font-size:26px;
font-weight:700;
}

.logo span{
color:#6C63FF;
}

nav a{
margin-left:30px;
text-decoration:none;
color:#333;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#6C63FF;
}

/* SECTION */
section{
padding:140px 20px 80px 20px;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

h2{
font-size:32px;
margin-bottom:30px;
}

/* PAYMENT BOX */
.payment-box{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
width:100%;
max-width:500px;
}

.payment-option{
margin:15px 0;
font-size:18px;
}

.payment-option input{
margin-right:10px;
}

.card-fields{
margin-top:20px;
display:flex;
flex-direction:column;
}

.card-fields input{
margin:8px 0;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

.btn{
display:block;
width:100%;
padding:14px;
background:linear-gradient(135deg,#6C63FF,#4b44d4);
color:white;
border:none;
border-radius:40px;
font-weight:600;
margin-top:25px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

/* FOOTER */
footer{
padding:20px;
text-align:center;
background:#ddd;
}
</style>
</head>

<body>

<header>
<div class="logo">🐾 Pet<span>Linka</span></div>

<nav>
<a href="index.html">Home</a>
<a href="servicos.html">Serviços</a>
<a href="agendamento.html">Agendamento</a>
<a href="carrinho.html">Carrinho</a>
<a href="forma-de-pagamento.html">Pagamento</a>
</nav>
</header>

<section>

<h2>Forma de Pagamento</h2>

<div class="payment-box">

<div class="payment-option">
<label>
<input type="radio" name="pagamento" checked>
PIX
</label>
</div>

<div class="payment-option">
<label>
<input type="radio" name="pagamento">
Cartão de Crédito
</label>
</div>

<div class="payment-option">
<label>
<input type="radio" name="pagamento">
Cartão de Débito
</label>
</div>

<div class="card-fields">
<input type="text" placeholder="Número do Cartão">
<input type="text" placeholder="Nome no Cartão">
<input type="text" placeholder="Validade (MM/AA)">
<input type="text" placeholder="CVV">
</div>

<button class="btn">Confirmar Pagamento</button>

</div>

</section>

<footer>
© 2026 PetLinka - Plataforma Full Stack
</footer>

</body>
</html>
